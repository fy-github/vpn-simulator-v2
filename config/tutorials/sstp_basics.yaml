name: "SSTP 基础教程"
protocol: sstp
description: "学习 SSTP 协议的工作流程，包括 SSL/TLS 握手和 PPP 协商。"
difficulty: intermediate
estimated_time: 15

steps:
  - title: "TCP Connection"
    description: "客户端向服务端的 443 端口发起 TCP 连接。SSTP 使用 HTTPS 标准端口，这使得它能够穿透大多数防火墙和 NAT 设备。TCP 三次握手（SYN → SYN-ACK → ACK）建立可靠的传输层连接，为后续的 TLS 握手提供基础。SSTP 选择 443 端口是其最大的优势之一——与 HTTPS 流量混在一起，难以被中间设备识别和阻断。"
    packet_info: "TCP 三次握手数据包：(1) 客户端 → 服务端：SYN 标志位，Seq=X，源端口随机，目标端口 443；(2) 服务端 → 客户端：SYN+ACK 标志位，Seq=Y，Ack=X+1；(3) 客户端 → 服务端：ACK 标志位，Seq=X+1，Ack=Y+1。连接建立后进入 ESTABLISHED 状态，后续所有 SSTP 通信均通过此 TCP 连接传输。"
    rfc_reference: "RFC 8462 - Secure Socket Tunneling Protocol (SSTP) / TCP/IP Guide"
    expected_state: "TCP_ESTABLISHED"
    hint: "SSTP 使用 443 端口是因为它完全基于 HTTPS 传输，这使得 SSTP 流量与普通网页浏览流量无法区分。"

  - title: "SSL/TLS Handshake - Client Hello"
    description: "客户端在已建立的 TCP 连接上发起 TLS 握手，发送 Client Hello 消息。此消息包含客户端支持的 TLS 版本（通常为 TLS 1.2 或 1.3）、密码套件列表、压缩方法和客户端随机数。SSTP 要求必须使用 TLS 加密，这是与 PPTP 等协议的重要区别——所有控制和数据通道都受 TLS 保护。"
    packet_info: "TLS Client Hello 封装在 TLS 记录中：ContentType=0x16（Handshake）+ TLS 版本（0x0303 表示 TLS 1.2）+ 长度 + HandshakeType=0x01（ClientHello）+ 客户端随机数（32字节）+ Session ID + 密码套件列表（如 TLS_RSA_WITH_AES_256_GCM_SHA384）+ 压缩方法（通常为空）+ 扩展（SNI、ALPN 等）。"
    rfc_reference: "RFC 8462 Section 3 / RFC 5246 Section 7.4.1.2"
    expected_state: "TLS_CLIENT_HELLO_SENT"
    hint: "SSTP 的 TLS 握手与浏览器访问 HTTPS 网站的流程完全相同，这也是它能穿透防火墙的关键原因。"

  - title: "SSL/TLS Handshake - Server Hello + Certificate"
    description: "服务端响应 Server Hello，选择双方都支持的密码套件，并发送服务端证书。证书包含服务端的公钥，用于后续密钥交换和身份验证。服务端还发送 Server Hello Done 表示握手消息发送完毕。客户端需要验证证书链的完整性和有效性，确认连接的是合法的 SSTP 服务端。"
    packet_info: "服务端发送多个 TLS 记录：(1) Server Hello（选定的密码套件 + 服务端随机数 32 字节）；(2) Certificate（X.509 证书链，包含服务端证书和中间 CA 证书）；(3) Server Hello Done（HandshakeType=0x0e，表示服务端握手消息结束）。这些记录通过 TCP 连接依次发送。"
    rfc_reference: "RFC 5246 Section 7.4.2 / RFC 8462 Section 3.2"
    expected_state: "TLS_SERVER_HELLO_RECEIVED"
    hint: "服务端证书用于身份验证，客户端应验证证书是否由可信 CA 签发、是否过期、域名是否匹配。"

  - title: "SSL/TLS Handshake - Key Exchange & Finished"
    description: "客户端生成预主密钥（Pre-Master Secret），使用服务端证书中的公钥加密后发送 ClientKeyExchange。双方根据预主密钥和各自随机数派生出主密钥（Master Secret），再派生出会话所需的加密密钥和 HMAC 密钥。客户端和服务端分别发送 ChangeCipherSpec 和 Finished 消息，验证握手完整性。至此 TLS 会话建立完成，后续所有通信均加密。"
    packet_info: "客户端发送：(1) ClientKeyExchange（包含加密的预主密钥，48 字节随机数用服务端 RSA 公钥加密或 DH 公钥参数）；(2) ChangeCipherSpec（通知切换到加密通信）；(3) Finished（PRF(MasterSecret, Hash(所有握手消息)) 的验证数据，12 字节）。服务端同样发送 ChangeCipherSpec 和 Finished。之后所有数据使用 AES-256-GCM 等算法加密。"
    rfc_reference: "RFC 5246 Section 7.4.7 / RFC 5246 Section 7.4.9"
    expected_state: "TLS_ESTABLISHED"
    hint: "TLS 握手完成后，所有后续的 SSTP 控制消息和 PPP 数据都受 TLS 保护，包括 PPP 认证凭据。"

  - title: "SSTP Hello - Version Negotiation"
    description: "TLS 会话建立后，客户端发送 SSTP Hello 消息发起 SSTP 协议层的握手。Hello 消息包含客户端支持的 SSTP 协议版本号和一些属性。服务端检查版本兼容性，确认双方使用兼容的 SSTP 协议版本。这是 SSTP 特有的控制消息，与 TLS 握手不同，它工作在 TLS 加密层之上。"
    packet_info: "SSTP Hello 消息结构：SSTP 控制消息头（Version=0x10, ControlType=0x01 SSTP_CTRL_PACKET_HELLO）+ 消息长度（4字节）+ 属性数量（2字节）+ 属性列表。每个属性包含：属性ID（2字节）+ 属性长度（2字节）+ 属性值。常见属性：SSTP_ATTRIB_ENCAPSULATED_PROTOCOL_ID（封装协议类型）、SSTP_ATTRIB_STATUS_INFO（状态信息）。"
    rfc_reference: "RFC 8462 Section 3.2 - SSTP Hello"
    expected_state: "SSTP_HELLO_SENT"
    hint: "SSTP Hello 是 SSTP 协议层的握手，与 TLS 握手不同——TLS 负责加密，SSTP Hello 负责协议版本协商。"

  - title: "SSTP Hello ACK - Server Acknowledges"
    description: "服务端收到客户端的 Hello 消息后，验证协议版本和属性，回复 SSTP Hello ACK 消息确认连接建立。ACK 消息包含服务端选择的协议版本和配置参数。至此 SSTP 控制通道完全建立，双方可以开始协商 PPP 协议。如果版本不兼容，服务端会回复错误消息并断开连接。"
    packet_info: "SSTP Hello ACK 消息结构：SSTP 控制消息头（Version=0x10, ControlType=0x02 SSTP_CTRL_PACKET_HELLO_ACK）+ 消息长度（4字节）+ 属性数量（2字节）+ 属性列表。属性可能包含：SSTP_ATTRIB_ENCAPSULATED_PROTOCOL_ID=0x0001（表示封装 PPP 协议）、SSTP_ATTRIB_CRYPTO_BINDING_REQ（加密绑定请求，用于防中间人攻击）。"
    rfc_reference: "RFC 8462 Section 3.2 - SSTP Hello ACK"
    expected_state: "SSTP_ESTABLISHED"
    hint: "Hello ACK 完成后，SSTP 控制通道建立，接下来将在 SSTP 隧道内进行 PPP 协议协商。"

  - title: "PPP LCP - Link Control Protocol Negotiation"
    description: "SSTP 隧道内开始 PPP 协议协商，首先进行 LCP（Link Control Protocol）阶段。客户端和服务端交换 LCP Configure-Request 消息，协商最大接收单元（MRU）、认证协议、魔术数字（Magic Number）等链路参数。LCP 是 PPP 的基础，负责建立、配置和测试数据链路连接。"
    packet_info: "LCP Configure-Request 封装在 SSTP 数据帧中：SSTP 数据消息头（ControlType=0x00 SSTP_CTRL_PACKET_DATA）+ PPP 帧（Protocol=0xC021 LCP）+ LCP 头（Code=0x01 Configure-Request, Identifier, 长度）+ 选项列表。常见选项：MRU（0x01, 值通常为 1500）+ Auth-Protocol（0x03, 如 0xC223 表示 MS-CHAPv2）+ Magic-Number（0x05, 随机数用于检测环路）。"
    rfc_reference: "RFC 1661 - PPP / RFC 8462 Section 3.3 - PPP Session"
    expected_state: "PPP_LCP_NEGOTIATION"
    hint: "LCP 协商决定了 PPP 链路的基本参数，MRU 通常设为 1500 字节以匹配以太网 MTU。"

  - title: "PPP Authentication - MS-CHAPv2 or EAP"
    description: "LCP 协商完成后，进入 PPP 认证阶段。SSTP 最常使用 MS-CHAPv2（Microsoft Challenge Handshake Authentication Protocol v2）进行认证。服务端发送 Challenge，客户端计算 Response（基于用户密码的哈希），服务端验证后发送 Success 或 Failure。认证凭据在 TLS 加密的 SSTP 隧道内传输，提供双重保护。"
    packet_info: "MS-CHAPv2 认证过程：(1) 服务端 → 客户端：LCP Configure-ACK + Auth-Protocol=0xC223（MS-CHAPv2）；(2) 服务端发送 Challenge（Code=0x01, 16 字节随机挑战）；(3) 客户端发送 Response（Code=0x02, 24 字节 NT-Response + 16 字节 Peer-Challenge + 8 字节响应名称）；(4) 服务端验证后发送 Success（Code=0x03, 42 字节验证响应字符串）。EAP 认证也可使用，通过 LCP 的 EAP 协议类型（0xC227）协商。"
    rfc_reference: "RFC 2759 - MS-CHAPv2 / RFC 8462 Section 3.3.2"
    expected_state: "PPP_AUTH_COMPLETE"
    hint: "SSTP 的安全性来自两层：外层 TLS 加密保护整个隧道，内层 MS-CHAPv2 提供用户身份验证。"

  - title: "PPP IPCP - IP Configuration"
    description: "认证成功后，进入 IPCP（IP Control Protocol）阶段，协商 IP 地址和其他网络配置。服务端向客户端分配虚拟 IP 地址，客户端可能请求特定的 IP 地址或接受服务端分配。IPCP 还可以协商 DNS 服务器地址、WINS 服务器地址等配置参数。"
    packet_info: "IPCP 协商过程：(1) 客户端发送 Configure-Request（包含 IP-Address=0x03, 请求的 IP；Primary-DNS=0x81, 请求 DNS 服务器）；(2) 服务端回复 Configure-ACK（确认分配的 IP 和 DNS）或 Configure-Nak（建议不同的 IP）。IPCP 协议类型为 0x8021，封装在 PPP 帧中通过 SSTP 隧道传输。典型的 IP 分配：客户端 10.0.0.2，服务端 10.0.0.1，DNS 8.8.8.8。"
    rfc_reference: "RFC 1332 - IPCP / RFC 8462 Section 3.3.3"
    expected_state: "PPP_IPCP_COMPLETE"
    hint: "IPCP 完成后，客户端获得虚拟 IP 地址，可以开始通过 SSTP 隧道发送 IP 数据包。"

  - title: "SSTP Data - Encrypted PPP Frames over HTTPS"
    description: "PPP 协商完成后，SSTP 进入数据传输阶段。客户端的 IP 数据包被封装为 PPP 帧，再封装为 SSTP 数据消息，通过 TLS 加密的 TCP 连接（HTTPS）传输。服务端解密 SSTP 消息，提取 PPP 帧，解封装得到原始 IP 数据包，然后路由到目标网络。所有数据在传输过程中受 TLS 保护。"
    packet_info: "SSTP 数据帧结构：SSTP 数据消息头（Version=0x10, ControlType=0x00 SSTP_CTRL_PACKET_DATA）+ 消息长度（4字节）+ PPP 帧（Protocol=0x0021 IP数据）+ IP 数据包。整个 SSTP 消息通过 TLS 加密后在 TCP 连接上传输。每个数据帧包含：TLS 记录头 + 加密的 SSTP 数据 + TLS MAC（AEAD 模式下 MAC 内嵌于加密数据中）。"
    rfc_reference: "RFC 8462 Section 3.4 - Data Transfer"
    expected_state: "SSTP_DATA_TRANSFER"
    hint: "SSTP 数据传输完全基于 HTTPS，与普通网页浏览流量无法区分，这是 SSTP 的核心优势。"

  - title: "Keepalive - Connection Maintenance"
    description: "SSTP 使用 Echo Request/Response 消息维持连接活跃状态。服务端定期发送 SSTP Echo Request，客户端回复 Echo Response。如果在超时时间内未收到响应，连接将被断开。Keepalive 机制防止中间设备（如 NAT、防火墙）因超时而丢弃连接状态，确保隧道持续可用。"
    packet_info: "SSTP Echo 消息结构：SSTP 控制消息头（Version=0x10, ControlType=0x04 SSTP_CTRL_PACKET_ECHO_REQUEST 或 0x05 SSTP_CTRL_PACKET_ECHO_RESPONSE）+ 消息长度（4字节）。Echo Request/Response 通过已建立的 TLS 加密连接发送，不包含额外的属性数据。默认 Keepalive 间隔通常为 60 秒。"
    rfc_reference: "RFC 8462 Section 3.5 - Keepalive"
    expected_state: "SSTP_KEEPALIVE_ACTIVE"
    hint: "Keepalive 是维持 SSTP 隧道的关键机制，特别是在移动网络或 NAT 环境下，连接可能因长时间无数据而被中间设备丢弃。"

  - title: "Tunnel Active - Full SSTP Tunnel Operational"
    description: "SSTP 隧道完全建立并正常运行。客户端通过虚拟 PPP 适配器获得 IP 地址，所有经过隧道的流量被封装为 PPP 帧，再封装为 SSTP 数据消息，通过 TLS 加密的 HTTPS 连接传输。客户端的路由表被配置为将目标流量导向 SSTP 隧道。整个连接过程从 TCP 三次握手到隧道建立，体现了 SSTP 协议的安全性和可靠性。"
    packet_info: "完整的 SSTP 数据传输链路：客户端 IP 数据包 → PPP 封装（Protocol=0x0021）→ SSTP 数据消息封装（ControlType=0x00）→ TLS 加密（AES-256-GCM）→ TCP 传输（端口 443）→ 服务端。反向路径：服务端收到 TCP 数据 → TLS 解密 → 提取 SSTP 数据消息 → 提取 PPP 帧 → 解封装 IP 数据包 → 路由转发。整个链路提供端到端的加密保护。"
    rfc_reference: "RFC 8462 - Secure Socket Tunneling Protocol (SSTP)"
    expected_state: "TUNNEL_ACTIVE"
    hint: "恭喜！SSTP 隧道已成功建立。SSTP 结合了 PPP 的灵活性和 HTTPS 的穿透能力，是 Windows 环境下最可靠的 VPN 协议之一。"
