name: "OpenVPN 基础教程"
protocol: openvpn
description: "学习 OpenVPN 协议的 TLS 握手流程，包括密钥交换、证书验证和数据通道建立。"
difficulty: intermediate
estimated_time: 20

steps:
  - title: "P_HARD_RESET_CLIENT_INIT"
    description: "客户端发送初始硬重置请求，发起 OpenVPN 连接。客户端生成一个随机的客户端密钥（Client Random）和会话 ID，通过 UDP 1194 端口发送给服务端。这是 OpenVPN 控制通道的第一步，客户端表明自己希望建立一个新的 TLS 会话。"
    packet_info: "OpenVPN 数据包结构：Opcode（1字节，P_HARD_RESET_CLIENT_INIT=0x07）+ Session ID（8字节）+ Message Packet ID（4字节）+ HMAC（可选，20字节）+ 随机数（32字节客户端密钥）。整个数据包通过 UDP 传输。"
    rfc_reference: "OpenVPN Protocol Specification - Control Channel"
    expected_state: "WAIT_HARD_RESET_SERVER"
    hint: "P_HARD_RESET 是 OpenVPN 的 TCP-like 可靠传输机制的起点，后续 TLS 握手基于此控制通道。"

  - title: "P_HARD_RESET_SERVER_REPLY"
    description: "服务端收到客户端的硬重置请求后，生成自己的服务端密钥（Server Random）和会话 ID，回复给客户端。服务端验证客户端的协议版本，确认双方使用兼容的 OpenVPN 协议版本。此时双方各自拥有了会话标识，用于后续数据包的路由识别。"
    packet_info: "数据包结构：Opcode（P_HARD_RESET_SERVER_REPLY=0x08）+ Session ID（服务端分配的8字节）+ Message Packet ID（4字节）+ HMAC（可选）+ 随机数（32字节服务端密钥）。客户端和服务端现在各持有一个 Session ID 用于标识此连接。"
    rfc_reference: "OpenVPN Protocol Specification - Session ID Exchange"
    expected_state: "HARD_RESET_COMPLETE"
    hint: "双方交换的 Session ID 是后续所有数据包的会话标识，用于区分不同的 VPN 连接。"

  - title: "TLS Handshake - Client Hello"
    description: "客户端发起 TLS 握手，发送 Client Hello 消息。此消息包含客户端支持的 TLS 版本、密码套件列表、压缩方法和客户端随机数。OpenVPN 将 TLS 记录封装在控制通道数据包中传输，使用 P_CONTROL_V1 操作码。"
    packet_info: "TLS Client Hello 封装在 OpenVPN P_CONTROL_V1 包中：Opcode（0x04）+ Session ID + Message Packet ID + HMAC + TLS 记录（ContentType=0x16 Handshake + TLS版本 + 长度 + ClientHello）。ClientHello 包含：客户端随机数（32字节）+ Session ID + 密码套件列表 + 扩展。"
    rfc_reference: "RFC 5246 Section 7.4.1.2 / OpenVPN Protocol - TLS over Control Channel"
    expected_state: "TLS_CLIENT_HELLO_SENT"
    hint: "OpenVPN 的 TLS 握手与标准 TLS 1.2 流程相同，但封装在 UDP 控制通道中而非直接使用 TCP。"

  - title: "TLS Handshake - Server Hello + Certificate"
    description: "服务端响应 Server Hello，选择密码套件和压缩方法，并发送服务端证书。证书通常是由 CA 签发的 X.509 证书，包含服务端的公钥，用于后续密钥交换和身份验证。服务端还可能发送 CertificateRequest 以要求客户端证书进行双向认证。"
    packet_info: "服务端发送多个 TLS 记录：(1) Server Hello（选定的密码套件+服务端随机数）；(2) Certificate（X.509 证书链）；(3) 可选的 CertificateRequest；(4) Server Hello Done。这些记录可能分多个 OpenVPN P_CONTROL_V1 包传输，每个包有独立的 Message Packet ID。"
    rfc_reference: "RFC 5246 Section 7.4.2 / OpenVPN tls-auth/tls-crypt"
    expected_state: "TLS_SERVER_HELLO_RECEIVED"
    hint: "服务端证书用于身份验证和密钥交换，客户端应验证证书链的完整性和有效性。"

  - title: "TLS Handshake - Client Key Exchange"
    description: "客户端生成预主密钥（Pre-Master Secret），使用服务端证书中的公钥加密后发送。客户端同时发送自己的证书（如果服务端要求双向认证）和 CertificateVerify 消息以证明拥有对应私钥。预主密钥是后续生成会话密钥的基础材料。"
    packet_info: "客户端发送：(1) Certificate（客户端证书，可选）；(2) ClientKeyExchange（包含加密的预主密钥，48字节随机数用服务端 RSA 公钥加密或 DH 公钥参数）；(3) CertificateVerify（对握手消息的签名，可选）；(4) ChangeCipherSpec（通知切换到加密通信）；(5) Finished（加密的验证消息）。"
    rfc_reference: "RFC 5246 Section 7.4.7 / OpenVPN PRF 密钥派生"
    expected_state: "TLS_KEY_EXCHANGE_COMPLETE"
    hint: "预主密钥结合客户端随机数和服务端随机数，通过 PRF 函数派生出主密钥（Master Secret），再派生出会话所需的加密密钥和 HMAC 密钥。"

  - title: "TLS Handshake - Finished"
    description: "双方交换 Finished 消息，验证握手过程的完整性。客户端发送 ChangeCipherSpec 通知服务端后续数据将使用协商的密码套件加密，然后发送加密的 Finished 消息。服务端同样发送 ChangeCipherSpec 和 Finished 消息。至此 TLS 握手完成，控制通道加密建立。"
    packet_info: "Finished 消息包含：PRF(MasterSecret, Hash(所有握手消息)) 的验证数据（12字节）。ChangeCipherSpec 是独立的 TLS 记录（ContentType=0x14）。此后所有 OpenVPN 控制通道数据均使用协商的对称密钥加密，通常为 AES-256-GCM 或 AES-256-CBC + HMAC-SHA256。"
    rfc_reference: "RFC 5246 Section 7.4.9 / OpenVPN 密钥推导"
    expected_state: "TLS_ESTABLISHED"
    hint: "tls-auth 或 tls-crypt 在此阶段提供额外的 HMAC 保护，防止 DoS 攻击和未授权连接尝试。"

  - title: "PUSH_REQUEST"
    description: "客户端 TLS 握手完成后，发送 PUSH_REQUEST 请求服务端推送配置参数。此消息通过已建立的加密控制通道发送，请求服务端分配 IP 地址、推送路由规则和其他客户端配置。"
    packet_info: "PUSH_REQUEST 封装在 P_CONTROL_V1 包中，TLS 层加密传输。消息内容为纯文本字符串 'PUSH_REQUEST'，以空字符结尾。此时控制通道已完全加密，数据包包含：Opcode + Session ID + Packet ID + HMAC + 加密的 TLS 记录。"
    rfc_reference: "OpenVPN Management Interface - PUSH_REQUEST/PUSH_REPLY"
    expected_state: "PUSH_REQUEST_SENT"
    hint: "PUSH_REQUEST 是 OpenVPN 客户端请求服务端配置的标准流程，类似于 DHCP 的请求阶段。"

  - title: "PUSH_REPLY"
    description: "服务端回复 PUSH_REPLY，向客户端推送 IP 地址、路由、DNS 服务器和其他配置参数。客户端应用这些配置后，设置虚拟网卡接口的 IP 地址和路由表。这是 OpenVPN 区别于其他 VPN 协议的重要特性——服务端可以集中管理客户端配置。"
    packet_info: "PUSH_REPLY 消息包含逗号分隔的配置指令：ifconfig（客户端IP 子网掩码）、route（推送的路由条目）、dhcp-option（DNS/WINS 服务器）、redirect-gateway（重定向所有流量）、compress（压缩算法）等。典型内容如：'ifconfig 10.8.0.6 10.8.0.5,route 192.168.1.0 255.255.255.0,dhcp-option DNS 8.8.8.8'。"
    rfc_reference: "OpenVPN Configuration - ifconfig-push / push"
    expected_state: "CONFIG_PUSHED"
    hint: "PUSH_REPLY 中的 ifconfig 参数指定了 VPN 隧道的点对点 IP 地址对（客户端IP 服务端IP）。"

  - title: "Data Channel Setup - Cipher negotiation"
    description: "控制通道协商完成后，OpenVPN 配置数据通道的加密参数。数据通道使用独立于控制通道的密钥，通过 TLS 握手中的主密钥派生。客户端和服务端各自生成数据通道的加密密钥（cipher key）和 HMAC 密钥（hmac key），并通过 P_DATA_V1 或 P_DATA_V2 包交换确认。"
    packet_info: "数据通道密钥从 TLS 主密钥派生：key_material = PRF(MasterSecret, 'OpenVPN key expansion', ClientRandom + ServerRandom)。派生出 4 组密钥：客户端加密密钥、服务端加密密钥、客户端 HMAC 密钥、服务端 HMAC 密钥。如果使用 tls-crypt，数据通道密钥由 tls-crypt 独立管理。"
    rfc_reference: "OpenVPN Protocol - Data Channel / RFC 5246 PRF"
    expected_state: "DATA_CHANNEL_READY"
    hint: "数据通道使用与控制通道不同的密钥，即使控制通道密钥泄露也不会影响已传输的数据安全。"

  - title: "Tunnel Active - Encrypted data transfer"
    description: "OpenVPN 隧道完全建立，客户端和服务端可以通过加密的数据通道传输 IP 数据包。所有经过隧道的数据使用协商的对称加密算法（如 AES-256-GCM）加密，每个数据包包含 HMAC 验证以确保完整性。客户端的虚拟网卡接口（tun/tap）捕获流量并封装传输。"
    packet_info: "P_DATA_V1 数据包结构：Opcode（0x01-0x03）+ Session ID + 加密的 IP 数据包。P_DATA_V2（OpenVPN 2.4+）结构：Opcode（0x09）+ Peer ID（3字节）+ 加密的 IP 数据包。每个数据包包含：IV（初始化向量）+ 加密载荷 + HMAC（AEAD 模式下 HMAC 内嵌于加密数据中）。"
    rfc_reference: "OpenVPN Protocol - Data Channel / tun/tap 驱动"
    expected_state: "TUNNEL_ACTIVE"
    hint: "恭喜！OpenVPN 隧道已成功建立，所有流量经过 AES-256 加密保护，可以安全通信。"
