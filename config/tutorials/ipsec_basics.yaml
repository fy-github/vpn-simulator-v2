name: "IPSec/IKEv1 基础教程"
protocol: ipsec
description: "学习 IPSec/IKEv1 协议的完整握手流程，包括 Main Mode 和 Quick Mode 协商。"
difficulty: advanced
estimated_time: 25

steps:
  - title: "Main Mode: SA Initiation (MM1)"
    description: "发起端（Initiator）向响应端（Responder）发送 ISAKMP SA 提议。这是 IKEv1 Phase 1 Main Mode 的第一步，双方协商 ISAKMP SA 参数，包括加密算法、哈希算法、认证方式和 DH 组。"
    packet_info: "ISAKMP 头部包含：Initiator Cookie（8字节）、Responder Cookie（初始为0）、Next Payload（SA）、Version（1.0）、Exchange Type（Identity Protection / Main Mode）、Flags（无标志）。SA Payload 包含：DOI（IPSec）、Situation（Identity Only）。Proposal Payload 包含：Proposal Number（1）、Protocol ID（ISAKMP）、SPI（8字节随机数）、Transform Payload（加密算法如 AES-256、哈希算法如 SHA-256、认证方式如 Pre-Shared Key、DH 组如 Group 14）。"
    rfc_reference: "RFC 2409 Section 4"
    expected_state: "MM_SA_SENT"
    hint: "ISAKMP 使用 UDP 500 端口（NAT 穿越时使用 UDP 4500）。Cookie 由双方各自生成，用于标识 SA。"

  - title: "Main Mode: SA Response (MM2)"
    description: "响应端收到 SA 提议后，从提议列表中选择一个可接受的变换（Transform），并将选定的 SA 参数回复给发起端。如果没有任何提议可接受，响应端会返回通知。"
    packet_info: "ISAKMP 头部包含：Initiator Cookie（与 MM1 相同）、Responder Cookie（响应端生成）。SA Payload 包含选定的 Transform 参数。如果响应端接受提议，Proposal Payload 中只有一个 Transform。"
    rfc_reference: "RFC 2409 Section 4"
    expected_state: "MM_SA_RECEIVED"
    hint: "响应端从发起端的提议列表中选择一个安全参数组合。如果双方没有共同支持的算法，连接将失败。"

  - title: "Main Mode: Key Exchange (MM3)"
    description: "发起端发送 Diffie-Hellman 公钥和 Nonce 值。双方通过 DH 交换生成共享密钥材料（SKEYID），用于后续加密和认证。Nonce 是一个随机数，用于防止重放攻击。"
    packet_info: "ISAKMP 头部包含双方 Cookie。Key Exchange Payload 包含 DH 公钥（长度取决于 DH 组，如 Group 14 为 256 字节）。Nonce Payload 包含发起端生成的随机数（通常 16-256 字节）。可选的 Vendor ID Payload 用于标识特定厂商扩展。"
    rfc_reference: "RFC 2409 Section 5"
    expected_state: "MM_KEX_SENT"
    hint: "DH 交换允许双方在不安全的通道上协商出共享密钥。即使攻击者截获了 DH 公钥，也无法计算出共享密钥（离散对数难题）。"

  - title: "Main Mode: Key Exchange (MM4)"
    description: "响应端回复自己的 DH 公钥和 Nonce 值。此时双方都可以独立计算出相同的共享密钥材料（SKEYID、SKEYID_d、SKEYID_a、SKEYID_e）。"
    packet_info: "ISAKMP 头部包含双方 Cookie。Key Exchange Payload 包含响应端的 DH 公钥。Nonce Payload 包含响应端生成的随机数。双方使用 DH 共享密钥 + 双方 Nonce + 双方 Cookie 计算 SKEYID 系列密钥。"
    rfc_reference: "RFC 2409 Section 5"
    expected_state: "MM_KEX_RECEIVED"
    hint: "SKEYID 用于认证，SKEYID_d 用于派生 IPSec SA 密钥，SKEYID_a 用于 ISAKMP SA 认证，SKEYID_e 用于 ISAKMP SA 加密。"

  - title: "Main Mode: Authentication (MM5)"
    description: "发起端发送加密的身份信息（Identity）和认证数据。从此消息开始，所有 ISAKMP 消息都使用 SKEYID_e 进行加密保护。身份信息可以是 IP 地址、FQDN 或 ASN.1 DN。"
    packet_info: "ISAKMP 头部 Flags 字段设置 Encryption 位。整个 Payload 载荷使用 SKEYID_e 加密（如 AES-256-CBC）。Identification Payload 包含身份类型和身份数据。Authentication Payload 包含：对于 PSK 认证，是 HMAC-MD5/HMAC-SHA1 哈希值；对于证书认证，是数字签名。Hash 计算：HASH_I = prf(SKEYID, g^xi | g^xr | CKY-I | CKY-R | SAi_b | IDii_b)。"
    rfc_reference: "RFC 2409 Section 5.1"
    expected_state: "MM_AUTH_SENT"
    hint: "Main Mode 的优势在于身份信息被加密传输，保护了通信双方的身份隐私。这也是 Main Mode 需要 6 个消息而非 3 个的原因。"

  - title: "Main Mode: Authentication (MM6)"
    description: "响应端回复加密的身份信息和认证数据。收到 MM6 并验证通过后，ISAKMP SA（Phase 1）正式建立完成。双方现在拥有一条安全的 ISAKMP 通道，用于后续 Phase 2 Quick Mode 协商。"
    packet_info: "ISAKMP 头部 Flags 字段设置 Encryption 位。Identification Payload 包含响应端身份。Authentication Payload 包含响应端的认证数据。Hash 计算：HASH_R = prf(SKEYID, g^xr | g^xi | CKY-R | CKY-I | SAi_b | IDir_b)。ISAKMP SA 建立完成，后续 Quick Mode 消息将受到 ISAKMP SA 的加密保护。"
    rfc_reference: "RFC 2409 Section 5.1"
    expected_state: "PHASE1_COMPLETE"
    hint: "Phase 1 完成后，ISAKMP SA 的生命周期通常为 86400 秒（24小时）。Phase 1 SA 用于保护 Phase 2 的协商过程。"

  - title: "Quick Mode: Proposal (QM1)"
    description: "发起端在已建立的 ISAKMP SA 保护下，发送 IPSec SA 提议（Phase 2）。Quick Mode 用于协商 IPSec SA 参数，包括 ESP/AH 协议、加密算法、认证算法和 SA 生命周期。"
    packet_info: "整个消息使用 ISAKMP SA 加密保护。ISAKMP 头部 Exchange Type 为 Quick Mode。Hash Payload（带头部）包含 HASH(1) = prf(SKEYID_a, M-ID | SA | Ni [ | KE ] [ | IDci | IDcr ])。SA Payload 包含 IPSec SA 提议：协议（ESP/AH）、ESP 变换（如 AES-256、SHA-256、Tunnel Mode）、SA 生命周期。可选的 Identification Payload 用于指定受保护的流量选择器（源/目的 IP 和端口）。可选的 Key Exchange Payload 用于 PFS（Perfect Forward Secrecy）。"
    rfc_reference: "RFC 2409 Section 5.5"
    expected_state: "QM_PROPOSAL_SENT"
    hint: "Quick Mode 仅需 3 个消息，因为 Phase 1 已经建立了安全通道。PFS（完美前向保密）可选，启用后每次 Phase 2 协商都会进行新的 DH 交换。"

  - title: "Quick Mode: Response (QM2)"
    description: "响应端接受 IPSec SA 提议，回复选定的 SA 参数和 Hash 值。双方协商完成后，各自独立计算 IPSec SA 的加密密钥和认证密钥。"
    packet_info: "加密的 ISAKMP 消息。Hash Payload 包含 HASH(2) = prf(SKEYID_a, M-ID | SA_b | Nr [ | KE ] [ | IDci | IDcr ])。SA Payload 包含响应端选定的 IPSec SA 变换。Nonce Payload 包含响应端的 Nonce。如果启用了 PFS，还包含 Key Exchange Payload。双方使用 SKEYID_d 和 Nonce 派生 IPSec SA 密钥：KEYMAT = prf(SKEYID_d, protocol | SPI | Ni_b | Nr_b)。"
    rfc_reference: "RFC 2409 Section 5.5"
    expected_state: "QM_RESPONSE_RECEIVED"
    hint: "IPSec SA 密钥从 SKEYID_d 派生，确保不同 SA 使用不同密钥。每个方向（入站/出站）有独立的 IPSec SA 和 SPI。"

  - title: "Quick Mode: Confirmation (QM3)"
    description: "发起端发送最终确认消息。收到 QM3 后，IPSec SA（Phase 2）正式建立完成。双方现在拥有用于保护数据流量的 IPSec SA。"
    packet_info: "加密的 ISAKMP 消息。Hash Payload 包含 HASH(3) = prf(SKEYID_a, 0 | M-ID | SA_b | Ni_b | Nr_b)。此消息仅包含 Hash，不包含 SA 或 Nonce。IPSec SA 建立完成，每个方向有独立的 SPI（Security Parameter Index）和密钥材料。ESP SA 参数：SPI（32位）、加密密钥、认证密钥、SA 生命周期。"
    rfc_reference: "RFC 2409 Section 5.5"
    expected_state: "PHASE2_COMPLETE"
    hint: "Quick Mode 完成后，IPSec SA 就绪。每个 IPSec SA 有唯一的 SPI，用于接收端识别和处理 ESP 包。"

  - title: "ESP Tunnel Established"
    description: "IPSec ESP 隧道正式建立。ESP（Encapsulating Security Payload）在隧道模式下，将原始 IP 数据包完全加密后封装在新的 IP 包中传输。"
    packet_info: "ESP 隧道模式封装结构：新 IP 头部（源=网关IP，目的=对端网关IP）| ESP 头部（SPI + Sequence Number）| 加密的原始 IP 数据包 | ESP 尾部（Padding + Pad Length + Next Header）| ESP ICV（完整性校验值，如 HMAC-SHA256-128）。加密算法：AES-256-CBC/CTR。认证算法：HMAC-SHA256-128。ICV 长度通常为 128 位（16字节）。"
    rfc_reference: "RFC 4303"
    expected_state: "ESP_ACTIVE"
    hint: "ESP 同时提供机密性（加密）和完整性（ICV 认证）。隧道模式隐藏了原始 IP 头部，提供更好的隐私保护。"

  - title: "Data Transfer"
    description: "加密的 ESP 数据包在隧道中传输。每个 ESP 包使用 IPSec SA 的密钥进行加密和认证，Sequence Number 用于防止重放攻击。"
    packet_info: "数据流：原始 IP 包 -> ESP 加密封装（AES-256）-> ESP 认证（HMAC-SHA256）-> 新 IP 封装 -> 网络传输。接收端处理：验证 SPI 找到 SA -> 验证 Sequence Number（防重放）-> 验证 ICV（完整性）-> 解密 ESP 载荷 -> 还原原始 IP 包。每个 ESP 包的 Sequence Number 递增，接收端维护滑动窗口（通常 64-1024 个包）防止乱序和重放。"
    rfc_reference: "RFC 4303 Section 2"
    expected_state: "DATA_TRANSFERRING"
    hint: "ESP 的 Sequence Number 到达最大值后，SA 会触发重新协商（Rekey），确保密钥材料不会过度使用。"

  - title: "Tunnel Active"
    description: "IPSec VPN 隧道完全建立并正常运行。ISAKMP SA（Phase 1）保护 IKE 协商通道，IPSec SA（Phase 2）保护数据传输通道。系统持续监控 SA 状态，在生命周期到期前自动触发 Rekey。"
    packet_info: "隧道状态：ISAKMP SA（ISAKMP Cookie 对、加密算法、认证算法、生命周期 86400s）| IPSec SA（SPI 对、ESP 加密密钥、ESP 认证密钥、生命周期 3600s）。SA 生命周期管理：软超时（剩余 10%）触发 Rekey 协商，硬超时强制删除 SA。DPD（Dead Peer Detection）通过周期性 R-U-THERE 探测检测对端存活状态。NAT 穿越：检测 NAT 设备后，ISAKMP 端口切换到 UDP 4500，ESP 使用 UDP 封装（NAT-T，RFC 3948）。"
    rfc_reference: "RFC 2409, RFC 4303, RFC 3948"
    expected_state: "TUNNEL_ACTIVE"
    hint: "恭喜！IPSec/IKEv1 隧道已成功建立。Phase 1 SA 生命周期通常为 24 小时，Phase 2 SA 为 1 小时，系统会自动在到期前完成 Rekey。"
