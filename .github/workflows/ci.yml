name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Python 后端测试
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction

      - name: Lint with ruff
        run: |
          ruff check src/

      - name: Type check with mypy
        run: |
          mypy src/vpn_simulator --ignore-missing-imports

      - name: Run tests
        run: |
          pytest tests/ -v --cov=vpn_simulator --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # 前端测试
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        working-directory: web-ui
        run: npm ci

      - name: Lint
        working-directory: web-ui
        run: npm run lint

      - name: Type check
        working-directory: web-ui
        run: npm run type-check

      - name: Build
        working-directory: web-ui
        run: npm run build

  # Docker 构建测试
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t vpn-simulator:test -f docker/Dockerfile .

      - name: Test Docker image
        run: |
          docker run --rm -d --name vpn-test -p 8080:8080 vpn-simulator:test
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop vpn-test
